# =====================================================
# CONFIGURACIÓN DE LA APLICACIÓN
# =====================================================
spring:
  application:
    name: joyeria-back

  # =====================================================
  # CONFIGURACIÓN DE BASE DE DATOS POSTGRESQL (SUPABASE)
  # =====================================================
  datasource:
    url: ${DB_URL:jdbc:postgresql://db.kwnimpgoticbvkixwnsf.supabase.co:5432/postgres?sslmode=require}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:MpvauMA2Pm2uVOZI}
    driver-class-name: org.postgresql.Driver
    
    # =====================================================
    # CONFIGURACIÓN DE POOL DE CONEXIONES (HikariCP)
    # =====================================================
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000

  # =====================================================
  # CONFIGURACIÓN JPA / HIBERNATE
  # =====================================================
  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: validate
    show-sql: true
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
        use_sql_comments: true
        jdbc:
          lob:
            non_contextual_creation: true

# =====================================================
# CONFIGURACIÓN JWT (para implementar después)
# =====================================================
jwt:
  secret: TuClaveSecretaSuperSeguraDeAlMenos256BitsParaHS256DebeSerLargaYCompleja
  expiration: 86400000

# =====================================================
# CONFIGURACIÓN DEL SERVIDOR
# =====================================================
server:
  port: 8080
  error:
    include-message: always
    include-stacktrace: never

# =====================================================
# CONFIGURACIÓN DE LOGGING
# =====================================================
logging:
  level:
    root: INFO
    com.joyeriajoy.joyeria_back: DEBUG
    org.springframework.security: DEBUG
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE
